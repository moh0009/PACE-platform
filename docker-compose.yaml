services:
  db:
    image: postgres:alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: toor
      POSTGRES_DB: pace_db
    volumes:
      - local_pgdata:/var/lib/postgresql
    networks:
      - pace_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d pace_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - pace_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Database Configuration
      DB_HOST: "db"
      DB_PORT: "5432"
      DB_USER: "root"
      DB_PASSWORD: "toor"
      DB_NAME: "pace_db"
      # Redis Configuration
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ""
      # Server Configuration
      SERVER_PORT: "8080"
      # File Upload Configuration
      UPLOADS_DIR: "/tmp/uploads"
      MAX_FILE_SIZE: "2147483648"
      CHUNK_SIZE: "5242880"
      # Processing Configuration
      WORKER_COUNT: "4"
      QUEUE_MAX_RETRIES: "3"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pace_network

  frontend:
    build:
      context: ./frontend/pace-front_end
      dockerfile: Dockerfile
      args:
        # For Docker environment: frontend container talks to backend service
        # Browser connects to localhost via port mapping
        NEXT_PUBLIC_API_URL: "http://localhost:8080/api"
        NEXT_PUBLIC_WS_URL: "ws://localhost:8080/api"
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pace_network

volumes:
  local_pgdata:
  pgadmin-data:
  redis-data:


networks:
  pace_network:
